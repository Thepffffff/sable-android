name: Build Sable for Android ARM64

on:
  workflow_dispatch:
    inputs:
      sable_ref:
        description: 'Sable branch, tag, or commit SHA to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout Sable
        uses: actions/checkout@v4
        with:
          repository: ryanhcode/sable
          ref: ${{ github.event.inputs.sable_ref }}
          submodules: recursive

      # ── 2. Toolchains ────────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      # ── 3. Cargo config with explicit sysroot ─────────────────────────────
      # Writing this to a host directory that gets volume-mounted into Docker.
      # The sysroot flag is the main reason libm.so.6 appears when it's absent —
      # without it the NDK clang falls back to the Docker host's glibc sysroot.
      - name: Write Cargo config for Android target
        run: |
          mkdir -p "${{ github.workspace }}/.cargo-android"
          cat > "${{ github.workspace }}/.cargo-android/config.toml" << 'EOF'
          [target.aarch64-linux-android]
          linker = "/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          ar     = "/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          rustflags = [
            "-C", "link-arg=--sysroot=/ndk/toolchains/llvm/prebuilt/linux-x86_64/sysroot",
            "-C", "link-arg=-L/ndk/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/21",
          ]
          EOF

      # ── 4. Patch common/build.gradle ─────────────────────────────────────────
      # Key additions vs the original:
      #   • CXX_aarch64_linux_android  — needed if any transitive dep uses C++
      #   • CARGO_TARGET_..._RUSTFLAGS — passes --sysroot so linker uses Bionic
      #   • .cargo-android volume      — mounts our config.toml inside Docker
      - name: Patch common/build.gradle for Android ARM64
        run: |
          CARGO_CONFIG_DIR="${{ github.workspace }}/.cargo-android"
          cat > common/build.gradle << EOF
          import org.apache.tools.ant.taskdefs.condition.Os

          plugins {
              id 'multiloader-common'
              id 'net.neoforged.moddev'
          }

          def rustRootDir    = file("src/main/rust")
          def rustProjectDir = file("\$rustRootDir/rapier")
          def nativesDir     = file("src/main/resources/natives/sable_rapier")
          def cargoCacheDir  = project.layout.buildDirectory.file("cargo").get().asFile
          def ndkPath        = System.getenv("ANDROID_NDK_HOME") ?: "/opt/android-ndk"
          def cargoConfigDir = "${CARGO_CONFIG_DIR}"
          def docker         = Os.isFamily(Os.FAMILY_MAC) ? "/usr/local/bin/docker" : "docker"

          def dockerCommand = [
              docker, 'run', '--rm',
              // source tree
              '-v', "\$rustRootDir:/io",
              // cargo caches (speeds up rebuilds)
              '-v', "\$cargoCacheDir/git:/usr/local/cargo/git",
              '-v', "\$cargoCacheDir/registry:/usr/local/cargo/registry",
              // cargo config with sysroot flags
              '-v', "\$cargoConfigDir:/root/.cargo",
              // NDK
              '-v', "\$ndkPath:/ndk",
              // Compiler env vars
              '-e', 'CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang',
              '-e', 'CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar',
              '-e', 'CC_aarch64_linux_android=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang',
              '-e', 'CXX_aarch64_linux_android=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++',
              '-w', '/io/rapier',
              'sable-build'
          ]

          tasks.register('createContainersDirectory') {
              doLast {
                  if (!cargoCacheDir.exists()) cargoCacheDir.mkdirs()
              }
          }

          tasks.register('buildImage', Exec) {
              group       = 'rust'
              workingDir  rustRootDir
              commandLine docker, 'build', '-t', 'sable-build', '.'
              dependsOn   createContainersDirectory
          }

          tasks.register('cleanRust', Exec) {
              group       = 'rust'
              workingDir  rustProjectDir
              commandLine dockerCommand
              args        'cargo', 'clean'
              dependsOn   createContainersDirectory
          }

          tasks.register('compileRustAndroidAArch64', Exec) {
              group       = 'rust'
              workingDir  rustProjectDir
              commandLine dockerCommand
              args        'cargo', 'build', '--release', '--target', 'aarch64-linux-android'
              dependsOn   createContainersDirectory
          }

          tasks.register('buildRustNatives') {
              group       = 'build'
              description = 'Compiles Rust natives for Android ARM64 and copies them to resources.'
              dependsOn   compileRustAndroidAArch64
              finalizedBy copyRustNatives
          }

          tasks.register('copyRustNatives', Copy) {
              group = 'rust'
              into  nativesDir
              mustRunAfter(buildRustNatives)
              from(file("\$rustProjectDir/target/aarch64-linux-android/release/libsable_rapier.so")) {
                  rename { 'sable_rapier_aarch64_linux.so' }
              }
          }

          neoForge {
              neoFormVersion = neo_form_version
              def at = file('src/main/resources/META-INF/accesstransformer.cfg')
              if (at.exists()) accessTransformers.from(at.absolutePath)
              parchment {
                  minecraftVersion = parchment_minecraft
                  mappingsVersion  = parchment_version
              }
          }

          configurations {
              commonJava      { canBeResolved = false; canBeConsumed = true }
              commonResources { canBeResolved = false; canBeConsumed = true }
          }

          artifacts {
              commonJava      sourceSets.main.java.sourceDirectories.singleFile
              commonResources sourceSets.main.resources.sourceDirectories.singleFile
          }

          dependencies {
              compileOnly      "org.spongepowered:mixin:0.8.5"
              compileOnly      "io.github.llamalad7:mixinextras-common:0.5.3"
              annotationProcessor "io.github.llamalad7:mixinextras-common:0.5.3"
              api              "dev.ryanhcode.sable-companion:sable-companion-common-\$minecraft_version:\$sable_companion_version"
              implementation("foundry.veil:veil-common-\${project.minecraft_version}:\${project.veil_version}") {
                  exclude group: "maven.modrinth"
              }
              compileOnly("fuzs.forgeconfigapiport:forgeconfigapiport-fabric:\${forgeconfigapiport_version}") {
                  transitive = false
              }
              implementation "fuzs.forgeconfigapiport:forgeconfigapiport-common-neoforgeapi:\${forgeconfigapiport_version}"
          }
          EOF

      # ── 5. Build Docker image from Sable's own Dockerfile ────────────────────
      - name: Build Docker Image
        run: ./gradlew common:buildImage

      # ── 6. Add Android target inside the image ───────────────────────────────
      # Using 'docker rm' pattern (more reliable than 'sleep 60 + stop')
      - name: Add Android Rust target to Docker image
        run: |
          docker run --name sable-setup sable-build \
            rustup target add aarch64-linux-android
          docker commit sable-setup sable-build
          docker rm sable-setup

      # ── 7. Compile the .so ───────────────────────────────────────────────────
      - name: Build Rust Natives for Android ARM64
        run: ./gradlew common:buildRustNatives
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ── 8. Verify ELF dependencies ───────────────────────────────────────────
      # If libm.so.6 still appears after the sysroot fix, patchelf corrects it.
      # readelf output is printed so you can see exactly what's linked.
      - name: Verify and patch native .so dependencies
        run: |
          SO="common/src/main/resources/natives/sable_rapier/sable_rapier_aarch64_linux.so"

          echo "=== ELF NEEDED entries before patch ==="
          readelf -d "$SO" | grep NEEDED

          sudo apt-get install -y patchelf -q

          PATCHED=false

          if readelf -d "$SO" | grep -q "libm.so.6"; then
            echo "⚠ Found libm.so.6 — replacing with libm.so"
            patchelf --replace-needed libm.so.6 libm.so "$SO"
            PATCHED=true
          fi

          if readelf -d "$SO" | grep -q "libstdc++.so.6"; then
            echo "⚠ Found libstdc++.so.6 — replacing with libc++_shared.so"
            patchelf --replace-needed libstdc++.so.6 libc++_shared.so "$SO"
            PATCHED=true
          fi

          if readelf -d "$SO" | grep -q "libc.so.6"; then
            echo "⚠ Found libc.so.6 — replacing with libc.so"
            patchelf --replace-needed libc.so.6 libc.so "$SO"
            PATCHED=true
          fi

          if [ "$PATCHED" = true ]; then
            echo "=== ELF NEEDED entries after patch ==="
            readelf -d "$SO" | grep NEEDED
          else
            echo "✅ No glibc libraries found — .so looks clean for Android"
          fi

      # ── 9. Build the full mod (neoforge + fabric) ────────────────────────────
      - name: Build Full Mod
        run: ./gradlew build

      # ── 10. Upload ───────────────────────────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-arm64-${{ github.event.inputs.sable_ref }}
          path: |
            neoforge/build/libs/*.jar
            fabric/build/libs/*.jar
          if-no-files-found: error
