name: Build Sable Android Libs

on:
  workflow_dispatch:
    inputs:
      sable_version:
        description: 'Sable version (e.g. 1.0.6)'
        required: true
        default: '1.0.6'
      minecraft_version:
        description: 'Minecraft version (e.g. 1.21.1)'
        required: true
        default: '1.21.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # STEP 1: Build the Rust native (.so file)
  # Note: The 'sable' repo HAS a wrapper, so we use it there.
  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Discover and Checkout Sable Tag
        run: |
          git init
          git remote add origin https://github.com/ryanhcode/sable.git
          git fetch --tags origin
          
          VERSION_INPUT="${{ github.event.inputs.sable_version }}"
          MATCHED_TAG=$(git tag -l | grep -E "^v?${VERSION_INPUT}([-+]|$)" | head -n 1)
          if [ -z "$MATCHED_TAG" ]; then
            MATCHED_TAG=$(git tag -l | grep "${VERSION_INPUT}" | head -n 1)
          fi

          if [ -z "$MATCHED_TAG" ]; then
            echo "::error::Could not find a GitHub tag matching version ${VERSION_INPUT}"
            exit 1
          fi
          
          git checkout $MATCHED_TAG
          git submodule update --init --recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Patch common/build.gradle for Android
        run: |
          cat > common/build.gradle << 'EOF'
          import org.apache.tools.ant.taskdefs.condition.Os
          plugins {
              id 'multiloader-common'
              id 'net.neoforged.moddev'
          }
          def rustRootDir = file("src/main/rust")
          def rustProjectDir = file("$rustRootDir/rapier")
          def nativesDir = file("src/main/resources/natives/sable_rapier")
          def cargoCacheDir = project.layout.buildDirectory.file("cargo").get().asFile
          def ndkPath = System.getenv("ANDROID_NDK_HOME") ?: "/opt/android-ndk"
          def docker = "docker"
          def dockerCommand = [
                  docker, 'run', '--rm', '-v', "$rustRootDir:/io",
                  '-v', "$cargoCacheDir/git:/usr/local/cargo/git",
                  '-v', "$cargoCacheDir/registry:/usr/local/cargo/registry",
                  '-v', "$ndkPath:/ndk",
                  '-e', 'CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang',
                  '-e', 'CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar',
                  '-e', 'CC_aarch64_linux_android=/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang',
                  '-w', '/io/rapier', 'sable-build'
          ]
          tasks.register('buildImage', Exec) {
              commandLine docker, 'build', '-t', 'sable-build', rustRootDir
          }
          tasks.register('compileRustAndroidAArch64', Exec) {
              commandLine dockerCommand
              args 'cargo', 'build', '--release', '--target', 'aarch64-linux-android'
          }
          tasks.register('buildRustNatives') {
              dependsOn compileRustAndroidAArch64
              finalizedBy copyRustNatives
          }
          tasks.register('copyRustNatives', Copy) {
              into nativesDir
              from(file("$rustProjectDir/target/aarch64-linux-android/release/libsable_rapier.so")) {
                  rename { "sable_rapier_aarch64_linux.so" }
              }
          }
          EOF

      - name: Build and Setup Docker
        run: |
          ./gradlew common:buildImage
          CONTAINER=$(docker run -d sable-build sleep 60)
          docker exec $CONTAINER rustup target add aarch64-linux-android
          docker commit $CONTAINER sable-build
          docker stop $CONTAINER

      - name: Build Rust Natives
        run: ./gradlew common:buildRustNatives
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: android-native
          path: common/src/main/resources/natives/sable_rapier/sable_rapier_aarch64_linux.so

  # STEP 2: Build NeoForge Mod (Using system Gradle)
  build-neoforge:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Native
        uses: actions/download-artifact@v4
        with:
          name: android-native
          path: neoforge/src/main/resources/natives/sable_rapier/

      - name: Download Sable for Classpath
        env:
          SABLE_VERSION: ${{ github.event.inputs.sable_version }}
          MC_VERSION: ${{ github.event.inputs.minecraft_version }}
        run: |
          mkdir -p libs
          curl -s -G --data-urlencode "game_versions=[\"$MC_VERSION\"]" --data-urlencode "loaders=[\"neoforge\"]" "https://api.modrinth.com/v2/project/sable/version" -o versions.json
          URL=$(python3 -c "import json, os; v=json.load(open('versions.json')); print([f['url'] for v_ in v if os.environ['SABLE_VERSION'] in v_['version_number'] for f in v_['files'] if f['filename'].endswith('.jar') and '-sources' not in f['filename']][0])")
          curl -L "$URL" -o libs/sable.jar

      - name: Build Mod
        run: gradle :neoforge:build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-libs-neoforge
          path: neoforge/build/libs/!(*-sources|*-dev).jar

  # STEP 3: Build Fabric Mod (Using system Gradle)
  build-fabric:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Native
        uses: actions/download-artifact@v4
        with:
          name: android-native
          path: fabric/src/main/resources/natives/sable_rapier/

      - name: Download Sable for Classpath
        env:
          SABLE_VERSION: ${{ github.event.inputs.sable_version }}
          MC_VERSION: ${{ github.event.inputs.minecraft_version }}
        run: |
          mkdir -p libs
          curl -s -G --data-urlencode "game_versions=[\"$MC_VERSION\"]" --data-urlencode "loaders=[\"fabric\"]" "https://api.modrinth.com/v2/project/sable/version" -o versions.json
          URL=$(python3 -c "import json, os; v=json.load(open('versions.json')); print([f['url'] for v_ in v if os.environ['SABLE_VERSION'] in v_['version_number'] for f in v_['files'] if f['filename'].endswith('.jar') and '-sources' not in f['filename']][0])")
          curl -L "$URL" -o libs/sable.jar

      - name: Build Mod
        run: gradle :fabric:build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-libs-fabric
          path: fabric/build/libs/!(*-sources|*-dev).jar
