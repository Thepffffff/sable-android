name: Build Sable for Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Sable
        uses: actions/checkout@v4
        with:
          repository: ryanhcode/sable
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Setup Rust with Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Configure Cargo for Android NDK
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          ar = "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          EOF

      - name: Setup .NET (for BepuPhysics2 submodule)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build Docker Image
        run: ./gradlew common:buildImage

      - name: Build Rust Natives for Android
        run: ./gradlew common:buildRustNatives
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          RUST_TARGET: aarch64-linux-android

      - name: Build Full Mod
        run: ./gradlew build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-arm64
          path: |
            neoforge/build/libs/*.jar
            fabric/build/libs/*.jar
