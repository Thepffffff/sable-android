name: Build Sable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Sable
        uses: actions/checkout@v4
        with:
          repository: ryanhcode/sable
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Patch common/build.gradle for Android ARM64
        run: |
          # Remove all compileRust tasks and replace buildRustNatives
          sed -i "/compileRustMacAArch64\|compileRustMacX86\|compileRustLinuxAArch64\|compileRustLinux\|compileRustWindows/d" common/build.gradle

          # Add Android compile task and patch buildRustNatives
          sed -i "s/tasks.register('buildRustNatives') {/tasks.register('compileRustAndroidAArch64', Exec) {\n    group = 'rust'\n    workingDir rustProjectDir\n    commandLine dockerCommand\n    args 'cargo', 'zigbuild', '--release', '--target', 'aarch64-linux-android'\n    dependsOn createContainersDirectory\n}\n\ntasks.register('buildRustNatives') {/" common/build.gradle

          sed -i "s/dependsOn compileRustMacAArch64, compileRustMacX86, compileRustLinux, compileRustLinuxAArch64, compileRustWindows/dependsOn compileRustAndroidAArch64/" common/build.gradle

          # Fix copyRustNatives to only copy Android output
          sed -i "/aarch64-apple-darwin\|x86_64-apple-darwin\|x86_64-unknown-linux-gnu\|aarch64-unknown-linux-gnu\|x86_64-pc-windows-gnu/d" common/build.gradle

          sed -i "s/moves.forEach { map ->/def moves = \[\n            \[src: \"target\/aarch64-linux-android\/release\/libsable_rapier.so\", dest: \"sable_rapier_aarch64_linux.so\"\]\n    \]\n\n    moves.forEach { map ->/" common/build.gradle

      - name: Build Docker Image
        run: ./gradlew common:buildImage

      - name: Add Android Rust target to Docker image
        run: |
          CONTAINER=$(docker run -d sable-build sleep 60)
          docker exec $CONTAINER rustup target add aarch64-linux-android
          docker commit $CONTAINER sable-build
          docker stop $CONTAINER

      - name: Build Rust Natives for Android ARM64
        run: ./gradlew common:buildRustNatives

      - name: Build Full Mod
        run: ./gradlew build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-arm64
          path: |
            neoforge/build/libs/*.jar
            fabric/build/libs/*.jar
