name: Build Sable for Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Sable
        uses: actions/checkout@v4
        with:
          repository: ryanhcode/sable
          submodules: recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Configure Cargo for Android
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-linux-android]' >> ~/.cargo/config.toml
          echo 'linker = "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"' >> ~/.cargo/config.toml

      - name: Build Rust Natives
        run: ./gradlew common:buildRustNatives

      - name: Build Mod
        run: ./gradlew build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-arm64
          path: |
            **/build/libs/*.jar
