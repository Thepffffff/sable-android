name: Build Sable Android Libs

on:
  workflow_dispatch:
    inputs:
      sable_version:
        description: 'Sable version (e.g. 1.0.6)'
        required: true
        default: '1.0.6'
      minecraft_version:
        description: 'Minecraft version (e.g. 1.21.1)'
        required: true
        default: '1.21.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # STEP 1: Build the Rust native (.so file)
  # This part is external (ryanhcode/sable), so it stays the same.
  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Discover and Checkout Sable Tag
        run: |
          git init
          git remote add origin https://github.com/ryanhcode/sable.git
          git fetch --tags origin
          VERSION_INPUT="${{ github.event.inputs.sable_version }}"
          MATCHED_TAG=$(git tag -l | grep -E "^v?${VERSION_INPUT}([-+]|$)" | head -n 1) || MATCHED_TAG=$(git tag -l | grep "${VERSION_INPUT}" | head -n 1)
          if [ -z "$MATCHED_TAG" ]; then exit 1; fi
          git checkout $MATCHED_TAG
          git submodule update --init --recursive

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android NDK r27c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Patch common/build.gradle
        run: |
          cat > common/build.gradle << 'EOF'
          plugins { id 'multiloader-common'; id 'net.neoforged.moddev' }
          tasks.register('buildImage', Exec) { commandLine 'docker', 'build', '-t', 'sable-build', 'src/main/rust' }
          tasks.register('buildRustNatives', Exec) {
              commandLine 'docker', 'run', '--rm', '-v', "${project.file("src/main/rust")}:/io", '-v', "${System.getenv("ANDROID_NDK_HOME")}:/ndk", 'sable-build', 'cargo', 'build', '--release', '--target', 'aarch64-linux-android'
          }
          EOF

      - name: Build Rust Natives
        run: |
          ./gradlew common:buildImage
          ./gradlew common:buildRustNatives
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload native
        uses: actions/upload-artifact@v4
        with:
          name: android-native
          path: common/src/main/rust/rapier/target/aarch64-linux-android/release/libsable_rapier.so

  # STEP 2: Build NeoForge Mod
  build-neoforge:
    runs-on: ubuntu-latest
    needs: build-native
    # This ensures all 'run' commands happen inside your source folder
    defaults:
      run:
        working-directory: sable-android-libs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Native
        uses: actions/download-artifact@v4
        with:
          name: android-native
          # Path relative to the workspace root
          path: sable-android-libs/neoforge/src/main/resources/natives/sable_rapier/

      - name: Download Sable Dependency
        env:
          SABLE_VERSION: ${{ github.event.inputs.sable_version }}
          MC_VERSION: ${{ github.event.inputs.minecraft_version }}
        run: |
          mkdir -p libs
          curl -s -G --data-urlencode "game_versions=[\"$MC_VERSION\"]" --data-urlencode "loaders=[\"neoforge\"]" "https://api.modrinth.com/v2/project/sable/version" -o versions.json
          URL=$(python3 -c "import json, os; v=json.load(open('versions.json')); print([f['url'] for v_ in v if os.environ['SABLE_VERSION'] in v_['version_number'] for f in v_['files'] if f['filename'].endswith('.jar') and '-sources' not in f['filename']][0])")
          curl -L "$URL" -o libs/sable.jar

      - name: Build Mod
        run: gradle :neoforge:build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-libs-neoforge
          path: sable-android-libs/neoforge/build/libs/!(*-sources|*-dev).jar

  # STEP 3: Build Fabric Mod
  build-fabric:
    runs-on: ubuntu-latest
    needs: build-native
    defaults:
      run:
        working-directory: sable-android-libs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Native
        uses: actions/download-artifact@v4
        with:
          name: android-native
          path: sable-android-libs/fabric/src/main/resources/natives/sable_rapier/

      - name: Download Sable Dependency
        env:
          SABLE_VERSION: ${{ github.event.inputs.sable_version }}
          MC_VERSION: ${{ github.event.inputs.minecraft_version }}
        run: |
          mkdir -p libs
          curl -s -G --data-urlencode "game_versions=[\"$MC_VERSION\"]" --data-urlencode "loaders=[\"fabric\"]" "https://api.modrinth.com/v2/project/sable/version" -o versions.json
          URL=$(python3 -c "import json, os; v=json.load(open('versions.json')); print([f['url'] for v_ in v if os.environ['SABLE_VERSION'] in v_['version_number'] for f in v_['files'] if f['filename'].endswith('.jar') and '-sources' not in f['filename']][0])")
          curl -L "$URL" -o libs/sable.jar

      - name: Build Mod
        run: gradle :fabric:build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-libs-fabric
          path: sable-android-libs/fabric/build/libs/!(*-sources|*-dev).jar
